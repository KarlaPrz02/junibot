<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sudoku</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --panel: #f8fafc;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --accent: #0f766e;
      --shadow: rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Inter, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; padding: 2rem; }
    h1 { font-size: 1.8rem; margin: 0 0 1rem; text-align: center; font-weight: 700; letter-spacing: 0.02em; }
    .container { width: min(26rem, calc(100vw - 2rem)); background: var(--panel); border: 1px solid var(--border); border-radius: 0.75rem; box-shadow: 0 10px 35px var(--shadow); padding: 1.2rem; }
    .actions { display: grid; gap: 0.65rem; }
    .button {
      display: block; width: 100%; text-align: center;
      padding: 0.75rem 0.9rem; border-radius: 0.5rem;
      text-decoration: none; font-weight: 700; color: white;
      background: var(--primary); border: 1px solid transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .button:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--shadow); }
    .button:active { transform: translateY(0); }
    .secondary { background: transparent; color: var(--text); border-color: var(--border); font-weight: 600; }
    .subtitle { margin-top: 0.9rem; font-size: 0.92rem; color: #64748b; text-align: center; }
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    #loading-overlay.hidden { display: none; }
    .spinner { width: 2rem; height: 2rem; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      body { padding: 0; align-items: stretch; }
      .container { width: 100%; min-height: 100vh; border: none; border-radius: 0; box-shadow: none; display: flex; flex-direction: column; justify-content: center; padding: 1.5rem 1.2rem; }
      h1 { font-size: 1.5rem; }
      .subtitle { font-size: 0.85rem; }
      .button { padding: 1rem; font-size: 1.05rem; border-radius: 0.65rem; }
      .actions { gap: 0.85rem; }
    }
  </style>
</head>
<body>
  <div id="loading-overlay"><div class="spinner"></div></div>
  <main class="container" style="display:none;" id="app-container">
    <h1>Sudoku</h1>
    <p class="subtitle">Rellena la cuadrícula 9×9 con los números del 1 al 9.</p>
    <div class="actions">
      <a class="button" href="{{ url_for('sudoku_start_game', difficulty='facil') }}">Fácil</a>
      <a class="button" href="{{ url_for('sudoku_start_game', difficulty='medio') }}" style="background: var(--accent);">Medio</a>
      <a class="button secondary" href="{{ url_for('sudoku_start_game', difficulty='dificil') }}">Difícil</a>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@discord/embedded-app-sdk@1/dist/index.global.js"></script>
  <script>
    (async function() {
      const overlay = document.getElementById('loading-overlay');
      const container = document.getElementById('app-container');
      function show() { overlay.classList.add('hidden'); container.style.display = ''; }
      const timer = setTimeout(show, 3000);
      try {
        if (window.DiscordSDK) {
          const sdk = new window.DiscordSDK('{{ discord_client_id }}');
          await sdk.ready();
        }
      } catch(e) { console.log('Discord SDK error:', e); }
      clearTimeout(timer);
      show();
    })();
  </script>
</body>
</html>
